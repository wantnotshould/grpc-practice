syntax = "proto3";

package stream;

option go_package = "./stream/v1;stream_v1";

// 请求
message Request {
  string name = 1;
}

// 响应
message Response {
  string name = 1;
}

// 简单服务
service SimpleService {
 // 方法
  rpc Fun(Request) returns (Response) {}
}

// 文件下载
message FileDownloadResponse {
  string file_name = 1;
  bytes  content   = 2;
}

// 双向流消息结构
message ChatMessage {
  string user = 1;
  string text = 2;
}

// 流式
service StreamService {
 // 方法
  rpc Fun(Request)returns(stream Response) {}
 // 文件下载
  rpc FileDownload(Request)returns(stream FileDownloadResponse){}
  // 双向流：对话请求
  rpc Chat(stream ChatMessage) returns (stream ChatMessage) {}
}

// 文件上传
message FileUploadRequest {
  string file_name = 1;
  bytes  content   = 2;
}

// 流式（客户端）
service ClientStreamService {
  // 上传
  rpc Upload(stream FileUploadRequest) returns (Response) {}
}
